<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Header -->
    <header>
        <div class="header-links">
            <a href="#">Gmail</a>
            <a href="#">Imágenes</a>
            <div class="apps-icon">
                <i class="fas fa-th"></i>
            </div>
            <div class="user-profile">M</div>
        </div>
    </header>

    <!-- Main Content -->
    <main>
        <div class="logo-container">
            <div class="logo">
                <span>G</span><span>o</span><span>o</span><span>g</span><span>l</span><span>e</span>
            </div>
        </div>
        
        <div class="search-container">
            <div class="search-box">
                <i class="fas fa-search search-icon"></i>
                <input type="text" class="search-input" placeholder="Buscar en Google o escribir una URL">
                <div class="search-icons">
                    <i class="fas fa-microphone microphone-icon"></i>
                    <i class="fas fa-camera camera-icon"></i>
                </div>
            </div>
            
            <div class="search-buttons">
                <button class="search-btn">Buscar con Google</button>
                <button class="search-btn">Me siento con suerte</button>
            </div>
            
            <div class="language-section">
                Ofrecido por Google en: <a href="#">español (Latinoamérica)</a>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer>
        <div class="footer-country">
            <span>México</span>
        </div>
        
        <div class="footer-links">
            <div class="footer-left">
                <a href="#">Sobre Google</a>
                <a href="#">Publicidad</a>
                <a href="#">Negocios</a>
                <a href="#">Cómo funciona la Búsqueda</a>
            </div>
            
            <div class="footer-right">
                <a href="#">Privacidad</a>
                <a href="#">Condiciones</a>
                <a href="#">Preferencias</a>
            </div>
        </div>
    </footer>
</body>
</html>
